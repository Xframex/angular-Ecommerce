<div class="main-content page-m">
  <div class="section-content section-content-p30">
    <div class="container-fluid">
      <div class="checkout-card">
        <h2 class="checkout-title">🛒 Checkout</h2>

        <form [formGroup]="checkoutFormGroup" (ngSubmit)="onSubmit()">
          <!-- CUSTOMER -->
          <div formGroupName="customer" class="form-section">
            <h4 class="section-title">Customer Information</h4>

            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <input
                  class="form-control"
                  formControlName="firstName"
                  placeholder="John"
                />
              </div>

              <div class="form-group">
                <label>Last Name</label>
                <input
                  class="form-control"
                  formControlName="lastName"
                  placeholder="Doe"
                />
              </div>
            </div>

            <div class="form-group">
              <label>Email</label>
              <input
                class="form-control"
                formControlName="email"
                placeholder="example@email.com"
              />
            </div>
          </div>

          <!-- SHIPPING -->
          <div formGroupName="shippingAddress" class="form-section">
            <h4 class="section-title">Shipping Address</h4>

            <div class="form-row">
              <div class="form-group full">
                <label>Street</label>
                <input class="form-control" formControlName="street" />
              </div>

              <div class="form-group">
                <label>City</label>
                <input class="form-control" formControlName="city" />
              </div>

              <div class="form-group">
                <label>State</label>
                <input class="form-control" formControlName="state" />
              </div>

              <div class="form-group">
                <label>Country</label>
                <input class="form-control" formControlName="country" />
              </div>

              <div class="form-group">
                <label>Zip</label>
                <input class="form-control" formControlName="zipCode" />
              </div>
            </div>
          </div>

          <!-- CHECKBOX -->
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="sameAsShipping"
              (change)="copyShippingToBilling($event)"
            />
            <label for="sameAsShipping">Billing address same as shipping</label>
          </div>

          <!-- BILLING -->
          <div formGroupName="billingAddress" class="form-section">
            <h4 class="section-title">Billing Address</h4>

            <div class="form-row">
              <div class="form-group full">
                <label>Street</label>
                <input class="form-control" formControlName="street" />
              </div>

              <div class="form-group">
                <label>City</label>
                <input class="form-control" formControlName="city" />
              </div>

              <div class="form-group">
                <label>State</label>
                <input class="form-control" formControlName="state" />
              </div>

              <div class="form-group">
                <label>Country</label>
                <input class="form-control" formControlName="country" />
              </div>

              <div class="form-group">
                <label>Zip</label>
                <input class="form-control" formControlName="zipCode" />
              </div>
            </div>
          </div>

          <!-- PAYMENT -->
          <div class="form-section" formGroupName="creditCard">
            <h4 class="section-title">Payment</h4>

            <div class="form-group">
              <label>Card Type</label>
              <div class="select-wrapper">
                <select
                  class="form-control custom-select"
                  formControlName="cardType"
                >
                  <option value="" disabled selected>Select card type</option>
                  <option value="Visa">Visa</option>
                  <option value="Mastercard">Mastercard</option>
                  <option value="American Express">American Express</option>
                  <option value="Discover">Discover</option>
                  <option value="JCB">JCB</option>
                  <option value="Diners Club">Diners Club</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Name on Card</label>
              <input class="form-control" formControlName="nameOnCard" />
            </div>

            <div class="form-group">
              <label>Card Number</label>
              <input class="form-control" formControlName="cardNumber" />
            </div>

            <div class="form-group">
              <label>CVV</label>
              <input class="form-control" formControlName="securityCode" />
            </div>

            <div class="form-row">
              <!-- MONTH -->
              <div class="form-group">
                <label>Expiration Month</label>
                <div class="select-wrapper">
                  <select
                    class="form-control custom-select"
                    formControlName="expirationMonth"
                  >
                    <option value="" disabled selected>MM</option>
                    <option
                      *ngFor="let month of creditCardMonths"
                      [value]="month"
                    >
                      {{ month }}
                    </option>
                  </select>
                </div>
              </div>

              <!-- YEAR -->
              <div class="form-group">
                <label>Expiration Year</label>
                <div class="select-wrapper">
                  <select
                    class="form-control custom-select"
                    formControlName="expirationYear"
                  >
                    <option value="" disabled selected>YYYY</option>
                    <option *ngFor="let year of creditCardYears" [value]="year">
                      {{ year }}
                    </option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- ORDER SUMMARY -->
          <div class="order-summary">
            <h4 class="section-title">Order Summary</h4>

            <div class="summary-row">
              <span>Total Quantity:</span>
              <strong>{{ totalQuantity || 0 }}</strong>
            </div>

            <div class="summary-row">
              <span>Total Price:</span>
              <strong>{{ totalPrice | currency: "USD" }}</strong>
            </div>
          </div>

          <!-- BUTTON -->
          <div class="btn-container">
            <button type="submit" class="btn-submit">
              💳 Complete Purchase
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
